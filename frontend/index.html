<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediVault - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>MediVault</h2>
                <p>Your Personal Health Record</p>
            </div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>
                <div id="login-error" class="hidden text-center" style="color: #fca5a5; margin-bottom: 1rem; font-size: 0.875rem;"></div>
                <button type="submit" class="btn">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" required placeholder="Create a password">
                </div>
                <div id="signup-error" class="hidden text-center" style="color: #fca5a5; margin-bottom: 1rem; font-size: 0.875rem;"></div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        redirectIfAuth();

        function switchTab(tab) {
            if (tab === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-signup').classList.remove('active');
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('signup-form').classList.add('hidden');
            } else {
                document.getElementById('tab-signup').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('signup-form').classList.remove('hidden');
                document.getElementById('login-form').classList.add('hidden');
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = e.target.querySelector('button');
            
            try {
                btn.disabled = true;
                btn.style.opacity = '0.7';
                errorDiv.classList.add('hidden');
                
                const res = await apiCall('/auth/login', 'POST', { email, password });
                setToken(res.token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                btn.disabled = false;
                btn.style.opacity = '1';
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
            }
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const full_name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const errorDiv = document.getElementById('signup-error');
            const btn = e.target.querySelector('button');

            try {
                btn.disabled = true;
                btn.style.opacity = '0.7';
                errorDiv.classList.add('hidden');
                
                const res = await apiCall('/auth/signup', 'POST', { full_name, email, password });
                setToken(res.token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                btn.disabled = false;
                btn.style.opacity = '1';
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
